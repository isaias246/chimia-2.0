kind = "web"
previewPath = "/"
title = "CHEMIA — Chemistry Platform"
version = "1.0.0"
id = "artifacts/chemia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21225

[services.development]
run = "pnpm --filter @workspace/chemia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chemia", "run", "build" ]
publicDir = "artifacts/chemia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21225"
BASE_PATH = "/"
